<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donezo | 本地自动化控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/console/styles.css?v=20260712-recording-test" />
  </head>
  <body>
    <div id="app"></div>
    <div id="boot-error" style="display:none;padding:40px;font-family:system-ui,sans-serif;color:#333">
      <h2>🚨 控制台加载失败</h2>
      <p>请打开浏览器开发者工具 (F12) 查看 Console 错误信息。</p>
      <p>常见原因：</p>
      <ul>
        <li>JavaScript 语法错误</li>
        <li>API 连接失败</li>
        <li>浏览器缓存问题（尝试 Ctrl+F5 强制刷新）</li>
      </ul>
    </div>
    <script>
      window.onerror = function(msg, url, line) {
        console.error('JS Error:', msg, 'at', url, 'line', line);
        document.getElementById('boot-error').style.display = 'block';
      };
    </script>
    <script src="/console/app.js?v=20260712-recording-test"></script>
  </body>
</html>
